<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Project</title>
    <script>
      // GitHub Pages SPA support:
      // If we were redirected from `404.html` with `?p=...`, restore the original path.
      ;(function () {
        var params = new URLSearchParams(window.location.search)
        var p = params.get('p')
        if (!p) return
        var decoded = decodeURIComponent(p)
        // Guard against infinite loops if `p` accidentally contains another `?p=...`.
        if (decoded.startsWith('/?p=') || decoded.startsWith('?p=')) return

        // Vite replaces `%BASE_URL%` at build time (e.g. "/" or "/<repo>/").
        var base = '%BASE_URL%'
        if (base && !base.endsWith('/')) base += '/'

        var next = (base || '/') + decoded.replace(/^\//, '')
        window.history.replaceState(null, '', next)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
